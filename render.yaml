services:
  - type: web
    name: hasm-api
    env: python
    buildCommand: curl -fsSL https://deno.land/install.sh | sh && pip install -r requirements.txt
    startCommand: export PATH="$HOME/.deno/bin:$PATH" && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
